# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: generate contribution graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
            github_user_name: ${{ github.repository_owner }}
            # Comma-separated list of game names to generate. Default: pacman
            games: 'pacman,breakout'

      # Push the generated SVGs to the output branch
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
            target_branch: output
            build_dir: dist
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      # Runs a single command using the runners shell
      - name: Install Python Deps
        run: |
          pip3 install rich==9.10.0
      - name: Fetch stats and update README.md
        run: |
          python3 javyxu.py
      - name: Commit and push if needed
        run: |-
          git config --global user.email "xujavy@gmail.com"
          git config --global user.name "javy.xu"
          git commit -am "Updated README.md automatically" || exit 0
          git push
